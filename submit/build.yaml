AWSTemplateFormatVersion: "2010-09-09"
Description: >
  DS5220 Data Project 1 – Full event-driven anomaly detection stack.
  Resources: EC2 (Ubuntu 24.04 t3.micro), Security Group, Elastic IP,
  S3 bucket, IAM role/instance profile, SNS topic + HTTP subscription,
  and S3 event notification on raw/*.csv -> SNS.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  YourIPAddress:
    Type: String
    Description: >
      Your local IP address in CIDR notation for SSH access, e.g. 1.2.3.4/32.
      Find it at https://checkip.amazonaws.com
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/32$"
    ConstraintDescription: Must be a valid /32 CIDR block.

  GitRepoURL:
    Type: String
    Description: >
      HTTPS URL of your FORKED anomaly-detection repository.
      e.g. https://github.com/YOUR-USERNAME/anomaly-detection
    Default: https://github.com/yuthimreddy/anomaly-detection/blob/main/submit/build.yaml

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 Key Pair for SSH access.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # -------------------------------------------------------------------------
  # S3 Bucket
  # -------------------------------------------------------------------------
  AnomalyBucket:
    Type: AWS::S3::Bucket
    DependsOn: SNSTopicPolicy   # bucket notification needs the topic policy first
    Properties:
      # Let CloudFormation generate a unique name
      NotificationConfiguration:
        TopicConfigurations:
          - Event: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: raw/
                  - Name: suffix
                    Value: .csv
            Topic: !Ref AnomalySNSTopic

  # -------------------------------------------------------------------------
  # IAM Role & Instance Profile
  # -------------------------------------------------------------------------
  AnomalyEC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ds5220-dp1-ec2-role-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AnomalyBucketFullAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowFullAccessToAnomalyBucket
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:ListBucketMultipartUploads
                  - s3:AbortMultipartUpload
                Resource:
                  - !GetAtt AnomalyBucket.Arn
                  - !Sub "${AnomalyBucket.Arn}/*"

  AnomalyInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "ds5220-dp1-instance-profile-${AWS::StackName}"
      Roles:
        - !Ref AnomalyEC2Role

  # -------------------------------------------------------------------------
  # Security Group
  # -------------------------------------------------------------------------
  AnomalySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "DS5220 DP1 - Allow SSH from my IP and port 8000 from anywhere"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref YourIPAddress
          Description: SSH from my IP only
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0
          Description: FastAPI on port 8000 from anywhere (SNS + testing)
      Tags:
        - Key: Name
          Value: ds5220-dp1-sg

  # -------------------------------------------------------------------------
  # EC2 Instance
  # -------------------------------------------------------------------------
  AnomalyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0866a3c8686eaeeba   # Ubuntu 24.04 LTS us-east-1 (update if using a different region)
      InstanceType: t3.micro
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref AnomalyInstanceProfile
      SecurityGroupIds:
        - !Ref AnomalySecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 16
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            set -e
            exec > /var/log/userdata.log 2>&1

            # ---- System packages ----
            apt-get update -y
            apt-get install -y git python3 python3-pip python3-venv awscli

            # ---- Set BUCKET_NAME globally (persists across reboots/logins) ----
            echo 'BUCKET_NAME="${AnomalyBucket}"' >> /etc/environment
            export BUCKET_NAME="${AnomalyBucket}"

            # ---- Clone forked application ----
            git clone ${GitRepoURL} /opt/anomaly-detection

            # ---- Python virtual environment ----
            python3 -m venv /opt/anomaly-detection/venv
            /opt/anomaly-detection/venv/bin/pip install --upgrade pip
            /opt/anomaly-detection/venv/bin/pip install -r /opt/anomaly-detection/requirements.txt

            # ---- systemd service so FastAPI restarts on reboot ----
            cat > /etc/systemd/system/anomaly-detection.service << 'EOF'
            [Unit]
            Description=DS5220 Anomaly Detection FastAPI Service
            After=network.target

            [Service]
            User=root
            WorkingDirectory=/opt/anomaly-detection
            EnvironmentFile=/etc/environment
            ExecStart=/opt/anomaly-detection/venv/bin/fastapi run /opt/anomaly-detection/app.py --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=5
            StandardOutput=append:/opt/anomaly-detection/app.log
            StandardError=append:/opt/anomaly-detection/app.log

            [Install]
            WantedBy=multi-user.target
            EOF

            systemctl daemon-reload
            systemctl enable anomaly-detection
            systemctl start anomaly-detection

      Tags:
        - Key: Name
          Value: ds5220-dp1-instance

  # -------------------------------------------------------------------------
  # Elastic IP – attach to the instance for a stable address
  # -------------------------------------------------------------------------
  AnomalyEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  AnomalyEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref AnomalyEC2Instance
      EIP: !Ref AnomalyEIP

  # -------------------------------------------------------------------------
  # SNS Topic
  # -------------------------------------------------------------------------
  AnomalySNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ds5220-dp1

  # SNS Topic Policy – allows S3 to publish to the topic
  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref AnomalySNSTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowS3ToPublish
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref AnomalySNSTopic
            Condition:
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:s3:::${AWS::StackName}*"

  # -------------------------------------------------------------------------
  # SNS HTTP Subscription – points to the EC2 /notify endpoint
  # -------------------------------------------------------------------------
  AnomalySNSSubscription:
    Type: AWS::SNS::Subscription
    DependsOn: AnomalyEIPAssociation
    Properties:
      TopicArn: !Ref AnomalySNSTopic
      Protocol: http
      Endpoint: !Sub "http://${AnomalyEIP}:8000/notify"

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  BucketName:
    Description: Name of the S3 bucket created for this stack
    Value: !Ref AnomalyBucket

  InstancePublicIP:
    Description: Elastic IP address of the EC2 instance
    Value: !Ref AnomalyEIP

  APIBaseURL:
    Description: Base URL for the FastAPI service
    Value: !Sub "http://${AnomalyEIP}:8000"

  HealthCheckURL:
    Description: Health check endpoint
    Value: !Sub "http://${AnomalyEIP}:8000/health"

  SNSTopicARN:
    Description: ARN of the SNS topic
    Value: !Ref AnomalySNSTopic